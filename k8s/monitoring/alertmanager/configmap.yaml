apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring

data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'kunedevendraappa@gmail.com'
      smtp_auth_username: 'kunedevendraappa@gmail.com'
      smtp_auth_password: 'nxszerkayswsuhdz'
      smtp_require_tls: true

    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'gmail-alerts'

      routes:
      - match:
          severity: critical
        receiver: 'gmail-critical'
        repeat_interval: 1h

      - match:
          severity: warning
        receiver: 'gmail-warning'
        repeat_interval: 4h

    receivers:
    - name: 'gmail-alerts'
      email_configs:
      - to: 'kunedevendraappa@gmail.com'

        headers:
          Subject: '[BankApp] {{ .GroupLabels.alertname }}'

        text: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Time: {{ .StartsAt }}
          {{ end }}

    - name: 'gmail-critical'
      email_configs:
      - to: 'kunedevendraappa@gmail.com'

        headers:
          Subject: '🔴 [CRITICAL] BankApp - {{ .GroupLabels.alertname }}'

        text: |
          CRITICAL ALERT!

          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Time: {{ .StartsAt }}
          {{ end }}

    - name: 'gmail-warning'
      email_configs:
      - to: 'kunedevendraappa@gmail.com'

        headers:
          Subject: '🟡 [WARNING] BankApp - {{ .GroupLabels.alertname }}'

        text: |
          WARNING ALERT!

          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Time: {{ .StartsAt }}
          {{ end }}

    inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname']