apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.26.0

        args:
        - --config.file=/etc/alertmanager/alertmanager.yml
        - --storage.path=/alertmanager
        ports:
        - containerPort: 9093
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        # ✅ Read from secret
        env:
        - name: GMAIL_ADDRESS
          valueFrom:
            secretKeyRef:
              name: monitoring-secret
              key: gmail-address
        - name: GMAIL_APP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: monitoring-secret
              key: gmail-app-password
        volumeMounts:
        - name: alertmanager-config
          mountPath: /etc/alertmanager
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9093
          initialDelaySeconds: 20
          periodSeconds: 10
      volumes:
      - name: alertmanager-config
        configMap:
          name: alertmanager-config