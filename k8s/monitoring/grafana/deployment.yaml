apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
      containers:
      - name: grafana
        image: grafana/grafana:10.0.0
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        # ✅ From secret - not hardcoded
        - name: GF_SECURITY_ADMIN_USER
          value: "admin"

        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: monitoring-secret
              key: grafana-admin-password

        - name: GF_SMTP_ENABLED
          value: "true"

        - name: GF_SMTP_HOST
          value: "smtp.gmail.com:587"

        - name: GF_SMTP_USER
          valueFrom:
            secretKeyRef:
              name: monitoring-secret
              key: gmail-address

        - name: GF_SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: monitoring-secret
              key: gmail-app-password

        - name: GF_SMTP_FROM_ADDRESS
          valueFrom:
            secretKeyRef:
              name: monitoring-secret
              key: gmail-address

        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 15
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-pvc
      - name: grafana-datasources
        configMap:
          name: grafana-datasources