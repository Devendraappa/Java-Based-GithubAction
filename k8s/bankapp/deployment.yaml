apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankapp
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bankapp
  template:
    metadata:
      labels:
        app: bankapp
    spec:
      containers:
      - name: bankapp
        image: deva9017/bankapp:latest
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        ports:
        - containerPort: 8080

        # ✅ Fixed delays based on real testing
        readinessProbe:
          httpGet:
            path: /login
            port: 8080
          initialDelaySeconds: 60    # ← was 30, increased
          periodSeconds: 10
          failureThreshold: 5        # ← was 3, increased

        livenessProbe:
          httpGet:
            path: /login
            port: 8080
          initialDelaySeconds: 90    # ← was 60, increased
          periodSeconds: 15
          failureThreshold: 3

        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: spring-datasource-url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-root-password
