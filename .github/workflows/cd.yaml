name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:

  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t deva9017/bankapp:${{ github.run_number }} .

      - name: Push Docker Image
        run: |
          docker push deva9017/bankapp:${{ github.run_number }}

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name bankapp-cluster \
            --region ap-south-1

      - name: Deploy Kubernetes Resources
        run: |
          kubectl apply -f k8s/mysql/
          kubectl apply -f k8s/bankapp/

      - name: Update Image
        run: |
          kubectl set image deployment/bankapp \
          bankapp=deva9017/bankapp:${{ github.run_number }}

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/bankapp
