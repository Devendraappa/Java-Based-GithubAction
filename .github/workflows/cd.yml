name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment: production
    needs: []  # Remove if you want strict dependency

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: app

      # =========================================
      # BUILD DOCKER IMAGE + PUSH
      # =========================================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            deva9017/bankapp:latest
            deva9017/bankapp:${{ github.run_number }}
            deva9017/bankapp:${{ github.sha }}

      # =========================================
      # DEPLOY TO EKS
      # =========================================
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Connect to EKS
        run: aws eks update-kubeconfig --name bankapp-cluster --region ap-south-1

      - name: Create Kubernetes Secret
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
        run: |
          kubectl delete secret mysql-secret --ignore-not-found
          kubectl create secret generic mysql-secret \
            --from-literal=mysql-root-password="$MYSQL_ROOT_PASSWORD" \
            --from-literal=mysql-database="$MYSQL_DATABASE" \
            --from-literal=mysql-username="$MYSQL_USERNAME" \
            --from-literal=spring-datasource-url="$SPRING_DATASOURCE_URL"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/mysql/
          kubectl apply -f k8s/bankapp/

      - name: Wait for MySQL
        run: kubectl rollout status deployment/mysql --timeout=300s

      - name: Update bankapp image
        run: kubectl set image deployment/bankapp bankapp=deva9017/bankapp:${{ github.run_number }}

      - name: Annotate deployment
        run: kubectl annotate deployment/bankapp kubernetes.io/change-cause="Build:${{ github.run_number }} Commit:${{ github.sha }}" --overwrite

      - name: Verify Rollout
        run: kubectl rollout status deployment/bankapp --timeout=600s

      - name: Show Deployment Status
        run: |
          echo "===== PODS ====="
          kubectl get pods -o wide
          echo "===== HPA STATUS ====="
          kubectl get hpa bankapp-hpa
          echo "===== PVC STATUS ====="
          kubectl get pvc mysql-pvc
          echo "===== CURRENT IMAGE ====="
          kubectl get deployment bankapp -o=jsonpath='{.spec.template.spec.containers[0].image}'
          echo "===== ROLLOUT HISTORY ====="
          kubectl rollout history deployment/bankapp

      # Auto rollback on failure
      - name: Rollback if failed
        if: failure()
        run: |
          echo "Deploy failed! Rolling back..."
          kubectl rollout undo deployment/bankapp
