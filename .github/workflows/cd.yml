name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================================
      # DOWNLOAD ARTIFACT FROM CI PIPELINE
      # =========================================
      - name: Download Artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: app
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # =========================================
      # LOGIN TO DOCKER HUB
      # =========================================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =========================================
      # BUILD & PUSH DOCKER IMAGE
      # =========================================
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            deva9017/bankapp:latest
            deva9017/bankapp:${{ github.event.workflow_run.run_number }}
            deva9017/bankapp:${{ github.event.workflow_run.head_sha }}

      # =========================================
      # DEPLOY TO EKS
      # =========================================
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Connect to EKS
        run: aws eks update-kubeconfig --name bankapp-cluster --region ap-south-1

      # Create/Update Secret
      - name: Create Kubernetes Secret
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
        run: |
          kubectl delete secret mysql-secret --ignore-not-found
          kubectl create secret generic mysql-secret \
            --from-literal=mysql-root-password="$MYSQL_ROOT_PASSWORD" \
            --from-literal=mysql-database="$MYSQL_DATABASE" \
            --from-literal=mysql-username="$MYSQL_USERNAME" \
            --from-literal=spring-datasource-url="$SPRING_DATASOURCE_URL"

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/mysql/
          kubectl apply -f k8s/bankapp/

      - name: Wait for MySQL
        run: kubectl rollout status deployment/mysql --timeout=300s

      - name: Update BankApp Image
        run: |
          kubectl set image deployment/bankapp bankapp=deva9017/bankapp:${{ github.event.workflow_run.run_number }}

      - name: Annotate Deployment
        run: |
          kubectl annotate deployment/bankapp kubernetes.io/change-cause="Build:${{ github.event.workflow_run.run_number }} Commit:${{ github.event.workflow_run.head_sha }}" --overwrite

      - name: Verify Rollout
        run: kubectl rollout status deployment/bankapp --timeout=600s

      - name: Show Deployment Status
        run: |
          echo "===== PODS ====="
          kubectl get pods -o wide
          echo "===== SERVICES ====="
          kubectl get svc
          echo "===== HPA ====="
          kubectl get hpa
          echo "===== PVC ====="
          kubectl get pvc
          echo "===== CURRENT IMAGE ====="
          kubectl get deployment bankapp -o=jsonpath='{.spec.template.spec.containers[0].image}'
