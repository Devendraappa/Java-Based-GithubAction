name: Manual Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (prod/dev)'
        required: true
        type: choice
        options:
          - prod
          - dev
      image_tag:
        description: 'Build number (prod: 42, dev: dev-42)'
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment == 'prod' && 'production' || 'development' }}

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Connect to correct cluster
        run: |
          if [ "${{ github.event.inputs.environment }}" == "prod" ]; then
            aws eks update-kubeconfig --name ${{ secrets.PROD_CLUSTER_NAME }} --region ap-south-1
          else
            aws eks update-kubeconfig --name ${{ secrets.DEV_CLUSTER_NAME }} --region ap-south-1
          fi

      - name: Rollback
        run: |
          if [ "${{ github.event.inputs.environment }}" == "prod" ]; then
            ECR_REPO=bankapp-prod
          else
            ECR_REPO=bankapp-dev
          fi
          kubectl set image deployment/bankapp bankapp=${{ secrets.ECR_REGISTRY }}/$ECR_REPO:${{ github.event.inputs.image_tag }}

      - name: Verify rollback
        run: kubectl rollout status deployment/bankapp --timeout=300s

      - name: Show image
        run: kubectl get deployment bankapp -o=jsonpath='{.spec.template.spec.containers[0].image}'
