name: CICD Pipeline

on:
  #push:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Rollback image tag (optional)'
        required: false

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Project
        run: mvn clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: app

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            deva9017/bankapp:latest
            deva9017/bankapp:${{ github.run_number }}
            deva9017/bankapp:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Connect to EKS
        run: aws eks update-kubeconfig --name my-bankapp-cluster --region ap-south-1

      - name: Apply manifests
        run: kubectl apply -f ds.yml

      - name: Deploy new version
        run: |
          kubectl set image deployment/bankapp \
          bankapp=deva9017/bankapp:${{ github.run_number }}

      - name: Verify rollout
        run: kubectl rollout status deployment/bankapp --timeout=120s

      - name: Auto rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/bankapp

  rollback:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != ''
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Connect to EKS
        run: aws eks update-kubeconfig --name my-bankapp-cluster --region ap-south-1

      - name: Rollback to specific version
        run: |
          kubectl set image deployment/bankapp \
          bankapp=deva9017/bankapp:${{ github.event.inputs.image_tag }}

      - name: Verify rollout
        run: kubectl rollout status deployment/bankapp
