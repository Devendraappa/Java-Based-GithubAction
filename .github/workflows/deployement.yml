name: CICD Pipeline 

on:
  #push:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Enter build number to rollback (example: 10)'
        required: true
        default: ''

jobs:

# =========================================
# 1. COMPILE
# =========================================
  compile:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

# =========================================
# 2. SECURITY CHECK
# =========================================
  security-check:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Installation
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy FS Scan
        run: trivy fs .

      - name: Gitleaks Installation
        run: sudo apt install gitleaks -y

      - name: Gitleaks Code Scan
        run: |
          gitleaks detect \
          --source . \
          --report-format json \
          --report-path gitleaks-report.json

# =========================================
# 3. TEST
# =========================================
  test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: security-check
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

# =========================================
# 4. BUILD + SONAR SCAN
# =========================================
  build_project_and_sonar_scan:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Project
        run: mvn package --batch-mode -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=Devendraappa_Java-Based-GithubAction
            -Dsonar.organization=devendraappa
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java

      - name: SonarQube Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# =========================================
# 5. BUILD DOCKER IMAGE + PUSH
# =========================================
  build_docker_image_and_push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build_project_and_sonar_scan
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: app

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            deva9017/bankapp:latest
            deva9017/bankapp:${{ github.run_number }}
            deva9017/bankapp:${{ github.sha }}

# =========================================
# 6. DEPLOY TO EKS
# =========================================
  deploy_to_kubernetes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build_docker_image_and_push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Connect to EKS
        run: aws eks update-kubeconfig --name bankapp-cluster --region ap-south-1

      # ✅ Delete and recreate - never fails on re-run
      - name: Create Kubernetes Secret
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
        run: kubectl delete secret mysql-secret --ignore-not-found && kubectl create secret generic mysql-secret --from-literal=mysql-root-password="$MYSQL_ROOT_PASSWORD" --from-literal=mysql-database="$MYSQL_DATABASE" --from-literal=mysql-username="$MYSQL_USERNAME" --from-literal=spring-datasource-url="$SPRING_DATASOURCE_URL"

      # ✅ Creates PVC, HPA, PDB, Deployments, Services
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/mysql/
          kubectl apply -f k8s/bankapp/

      # ✅ Wait for MySQL before starting bankapp
      - name: Wait for MySQL to be ready
        run: kubectl rollout status deployment/mysql --timeout=300s

      # ✅ Update bankapp with exact build number
      - name: Update bankapp image
        run: kubectl set image deployment/bankapp bankapp=deva9017/bankapp:${{ github.run_number }}

      # ✅ Tag deployment with build info
      - name: Annotate deployment
        run: kubectl annotate deployment/bankapp kubernetes.io/change-cause="Build:${{ github.run_number }} Commit:${{ github.sha }}" --overwrite

      # ✅ Wait for bankapp rollout
      - name: Verify Rollout
        run: kubectl rollout status deployment/bankapp --timeout=600s

      # ✅ Full status after deploy
      - name: Show Deployment Status
        run: |
          echo "===== PODS ====="
          kubectl get pods -o wide
          echo "===== HPA STATUS ====="
          kubectl get hpa bankapp-hpa
          echo "===== PVC STATUS ====="
          kubectl get pvc mysql-pvc
          echo "===== CURRENT IMAGE ====="
          kubectl get deployment bankapp -o=jsonpath='{.spec.template.spec.containers[0].image}'
          echo "===== ROLLOUT HISTORY ====="
          kubectl rollout history deployment/bankapp

      # ✅ Auto rollback if anything fails
      - name: Rollback if failed
        if: failure()
        run: |
          echo "Deploy failed! Rolling back..."
          kubectl rollout undo deployment/bankapp

# =========================================
# 7. MANUAL ROLLBACK
# Triggered manually from GitHub Actions UI
# =========================================
  rollback:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Connect to EKS
        run: aws eks update-kubeconfig --name bankapp-cluster --region ap-south-1

      - name: Rollback to selected build
        run: |
          echo "Rolling back to build: ${{ github.event.inputs.image_tag }}"
          kubectl set image deployment/bankapp bankapp=deva9017/bankapp:${{ github.event.inputs.image_tag }}

      - name: Verify rollback
        run: kubectl rollout status deployment/bankapp --timeout=300s

      - name: Show rolled back image
        run: kubectl get deployment bankapp -o=jsonpath='{.spec.template.spec.containers[0].image}'
