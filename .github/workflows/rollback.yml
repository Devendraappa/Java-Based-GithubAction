name: Manual Rollback

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Enter build number to rollback (example: 10)'
        required: true
        default: ''

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Connect to EKS
        run: aws eks update-kubeconfig --name bankapp-cluster --region ap-south-1

      # ✅ Account ID from secret
      - name: Rollback to selected build
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
        run: |
          echo "Rolling back to build: ${{ github.event.inputs.image_tag }}"
          kubectl set image deployment/bankapp bankapp=${{ env.ECR_REGISTRY }}/bankapp:${{ github.event.inputs.image_tag }}

      - name: Verify rollback
        run: kubectl rollout status deployment/bankapp --timeout=300s

      - name: Show rolled back image
        run: kubectl get deployment bankapp -o=jsonpath='{.spec.template.spec.containers[0].image}'
